services:
  app:
    build: .
    ports:
      - "3000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/odinbook
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: odinbook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
